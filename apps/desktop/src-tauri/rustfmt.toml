# --- Basic style ---
edition = "2021"  # Rust edition
max_width = 80    # Maximum line length
hard_tabs = false # Use spaces instead of tabs
tab_spaces = 4    # Number of spaces per indentation

# --- Code layout ---
newline_style = "Unix"       # Use LF (Unix style line endings)
use_small_heuristics = "Max" # Relax line-breaking heuristics

# --- Functions, parameters, blocks ---
fn_params_layout = "Tall" # Break function parameters onto new lines if too long
# brace_style = "AlwaysNextLine"          # NIGHTLY ONLY
# control_brace_style = "AlwaysNextLine"  # NIGHTLY ONLY

# --- Modules / imports ---
reorder_imports = true # Automatically reorder use statements
# group_imports = "StdExternalCrate"      # NIGHTLY ONLY

# --- Other ---
# format_macro_bodies = true              # NIGHTLY ONLY
# wrap_comments = true                    # NIGHTLY ONLY
# normalize_comments = true               # NIGHTLY ONLY
