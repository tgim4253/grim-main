name: release-desktop

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-desktop-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish ${{ matrix.platform_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform_name: macos-arm64
            runner: macos-15
            rust_target: aarch64-apple-darwin
            tauri_args: --target aarch64-apple-darwin
            apple_signing_identity: '-'
          - platform_name: macos-intel
            runner: macos-15-intel
            rust_target: x86_64-apple-darwin
            tauri_args: --target x86_64-apple-darwin
            apple_signing_identity: '-'
          - platform_name: windows-x64
            runner: windows-2022
            rust_target: ''
            tauri_args: ''
            apple_signing_identity: ''

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag belongs to main
        shell: bash
        run: |
          git fetch origin main:refs/remotes/origin/main --force
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" origin/main; then
            echo "::error::Release tags must point to commits reachable from main. Merge release/* into main before creating ${GITHUB_REF_NAME}."
            exit 1
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.13.1
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust target
        if: matrix.rust_target != ''
        run: rustup target add ${{ matrix.rust_target }}

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            apps/desktop/src-tauri -> target
          cache-on-failure: true

      - name: Build and publish desktop release
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: ${{ matrix.apple_signing_identity }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: Grim Desktop ${{ github.ref_name }}
          releaseBody: |
            Automated desktop release for:
            - macOS Apple Silicon (ad-hoc signed, not notarized)
            - macOS Intel (ad-hoc signed, not notarized)
            - Windows x64 (unsigned)
          releaseDraft: false
          prerelease: false
          uploadUpdaterJson: true
          uploadUpdaterSignatures: true
          args: ${{ matrix.tauri_args }}
