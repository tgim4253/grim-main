name: CI

on:
  push:
    branches:
      - main
      - develop
      - release/**

  pull_request:
    branches:
      - main
      - develop
      - release/**

jobs:
  frontend:
    name: Frontend Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Lint (TypeScript)
        run: npx eslint . --ext .ts,.tsx

      - name: Format check (Prettier)
        run: npx prettier --check .

      - name: Build frontend
        run: pnpm --filter @grim/desktop build

      - name: Report failure on pull requests
        if: ${{ failure() && github.event_name == 'pull_request' }}
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const jobName = context.job;
            const body = [
              `❌ CI failed in **${jobName}** for commit ${context.sha}.\n\nLogs: ${runUrl}`,
              '',
              `Check the logs for details: ${runUrl}`
            ].join('\n');

            await github.rest.issues.createComment({
              issue_number: context.payload.pull_request.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

  rust:
    name: Rust Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          # Core dev tools & helpers (recommended by Tauri docs)
          sudo apt-get install -y \
            build-essential \        # C/C++ toolchain for building native deps
            curl \                   # downloads in scripts
            wget \                   # downloads in scripts
            file \                   # file(1) utility
            pkg-config               # pkg-config lookup

          # WebKitGTK 4.1 stack (Ubuntu 24.04 / ubuntu-latest)
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \  # <- REQUIRED for Tauri/Wry on 24.04
            libsoup-3.0-dev          # <- Ensures soup3-sys finds libsoup-3.0.pc

          # Optional but recommended extras from Tauri docs
          sudo apt-get install -y \
            libxdo-dev \                      # for xdotool integration (global shortcut, etc.)
            libssl-dev \                      # for native-tls/openssl bindings used by many crates
            libayatana-appindicator3-dev \    # for system tray support
            librsvg2-dev                      # for SVG/icon handling

          # Your existing GTK/X11 deps (mostly redundant once webkit2gtk is installed,
          # but keeping them is harmless and can appease other crates)
          sudo apt-get install -y \
            libgtk-3-dev \
            libglib2.0-dev \
            libpango1.0-dev \
            libcairo2-dev \
            libatk1.0-dev \
            libgdk-pixbuf2.0-dev \
            libx11-dev \
            libx11-xcb-dev \
            libxcb1-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install rustfmt
        run: rustup component add rustfmt

      - name: Install clippy
        run: rustup component add clippy

      - name: Format check (cargo fmt)
        run: cargo fmt --manifest-path apps/desktop/src-tauri/Cargo.toml -- --check

      - name: Lint (cargo clippy)
        run: cargo clippy --manifest-path apps/desktop/src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: Build (cargo build)
        run: cargo build --manifest-path apps/desktop/src-tauri/Cargo.toml --release
